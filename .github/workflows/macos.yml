name: Build macOS app

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify release tag matches application version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="$(python3 -c 'from app import __version__; print(__version__)')"
          test "v${version}" = "${GITHUB_REF_NAME}"
      - name: Build app
        run: bash scripts/build_macos.sh
      - name: Archive app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/yikou-light-food.app" "yikou-light-food-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: yikou-light-food-macos
          path: yikou-light-food-macos.zip
